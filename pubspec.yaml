name: goguma
description: An IRC client for mobile devices.

publish_to: 'none'

# Build number is the Git commit count, obtained via:
#
#     git rev-list --first-parent --count HEAD
version: 0.9.1+1365

environment:
  sdk: ^3.0.0
  flutter: ^3.35.0

dependencies:
  app_links: ^7.0.0
  async: ^2.11.0
  audioplayers: ^6.4.0
  characters: ^1.4.0
  connectivity_plus: ^7.0.0
  crypto: ^3.0.7
  dynamic_color: ^1.7.0
  file_selector: ^1.0.1
  firebase_core: ^4.0.0
  firebase_messaging: ^16.0.0
  flutter:
    sdk: flutter
  flutter_apns_only: ^1.6.0
  flutter_background: ^1.3.0
  flutter_local_notifications: ^19.0.0
  geolocator: ^14.0.0
  hex: ^0.2.0
  html: ^0.15.2
  image_picker: ^1.0.4
  linkify: ^5.0.0
  mime: ^2.0.0
  path: ^1.8.1
  path_provider: ^2.1.5
  provider: ^6.0.1
  record: ^6.0.0
  # TODO: drop this unmaintained library
  scrollable_positioned_list:
    git:
      url: https://github.com/emersion/flutter.widgets.git
      ref: goguma
      path: packages/scrollable_positioned_list
  sentry: ^9.3.0
  share_handler: ^0.0.21
  share_plus: ^12.0.1
  shared_preferences: '^2.0.5'
  sqflite: ^2.0.2
  # TODO: remove upper version constraints once this issue is fixed:
  # https://github.com/tekartik/sqflite/issues/1192
  sqflite_common_ffi: '>=2.1.0 <2.4.0'
  sqlite3: '>=2.9.3 <3.0.0'
  unicode_emojis: ^0.5.0
  unifiedpush: ^6.0.1
  url_launcher: '^6.0.2'
  # TODO: replace "webcrypto" with the "cryptography" package once they have a
  # pure Dart Ecdh.p256 implementation
  webcrypto: ^0.6.0
  workmanager: ^0.9.0+2

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
